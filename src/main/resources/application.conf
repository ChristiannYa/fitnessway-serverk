ktor {
    application {
        modules = [com.example.ApplicationKt.module]
    }
    deployment {
        port = ${PORT}
    }
}

storage {
    driverClassName = "org.postgresql.Driver"
    jdbcURL = ${DB_URL}
    user = ${DB_USER}
    password = ${DB_PASSWORD}
}

jwt {
    secret = ${JWT_SECRET}
    issuer = ${JWT_ISSUER}
    audience = ${JWT_AUDIENCE}
    realm = ${JWT_REALM}
}